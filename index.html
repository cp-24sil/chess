<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chess</title>
</head>

<body>
    <canvas id="display" width="400" height="400"></canvas>
    <br>
    <h1>White:</h1>
    <h1>Black:</h1>
    <p id="message">true</p>
    <script src="./js/piece.js"></script>
    <script src="./js/pion.js"></script>
    <script src="./js/tour.js"></script>
    <script src="./js/cavalier.js"></script>
    <script src="./js/fou.js"></script>
    <script src="./js/roi.js"></script>
    <script src="./js/reine.js"></script>
    <script>
        const canvas = document.getElementById("display");
        canvas.addEventListener("click", onClick);
        /** @type {CanvasRenderingContext2D} */
        const ctx = canvas.getContext("2d");
        const plateau = [];
        const CELL_SIZE = 50;
        let isWhiteTurn = true;
        let selectedPion;
        let isWhite;
        let canA = true;
        let canB = true;
        let canC = true;
        let canD = true;
        let posX;
        let posY;
        let KingIsInChess = false;

        init();

        function init() {
            selectedPion = null;
            for (let y = 0; y < 8; y++) {
                plateau[y] = [];
                for (let x = 0; x < 8; x++) {
                    if ((x + y) % 2 !== 0) {
                        plateau[y][x] = {
                            colorIndex: "black",
                            piece: "",
                        }
                    }
                    else {
                        plateau[y][x] = {
                            colorIndex: "white",
                            piece: "",
                        }
                    }
                    if (y == 0 || y == 7) {
                        if (y == 0)
                            isWhite = false;
                        if (y == 7)
                            isWhite = true;
                        switch (x) {
                            case 0:
                                plateau[y][x].piece = new tour(isWhite, x, y);
                                plateau[y][x].isWhite = isWhite;
                                break;
                            case 1:
                                plateau[y][x].piece = new cavalier(isWhite, x, y);
                                plateau[y][x].isWhite = isWhite;
                                break;
                            case 2:
                                plateau[y][x].piece = new fou(isWhite, x, y);
                                plateau[y][x].isWhite = isWhite;
                                break;
                            case 3:
                                plateau[y][x].piece = new reine(isWhite, x, y);
                                plateau[y][x].isWhite = isWhite;
                                break;
                            case 4:
                                plateau[y][x].piece = new roi(isWhite, x, y);
                                plateau[y][x].isWhite = isWhite;
                                break;
                            case 5:
                                plateau[y][x].piece = new fou(isWhite, x, y);
                                plateau[y][x].isWhite = isWhite;
                                break;
                            case 6:
                                plateau[y][x].piece = new cavalier(isWhite, x, y);
                                plateau[y][x].isWhite = isWhite;
                                break;
                            case 7:
                                plateau[y][x].piece = new tour(isWhite, x, y);
                                plateau[y][x].isWhite = isWhite;
                                break;
                        }
                    }
                    else if (y == 1 || y == 6) {
                        if (y == 1) {
                            isWhite = false;
                        } else if (y == 6) {
                            isWhite = true;
                        }
                        plateau[y][x].piece = new pion(isWhite, x, y);
                        plateau[y][x].isWhite = isWhite;
                    }
                }
            }
            refresh();
        }

        function refresh() {
            for (let y = 0; y < 8; y++) {
                for (let x = 0; x < 8; x++) {
                    ctx.fillStyle = plateau[y][x].colorIndex;
                    ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                    if ((x + y) % 2 !== 0) {
                        ctx.fillStyle = "white";
                    }
                    else {
                        ctx.fillStyle = "black";
                    }
                    ctx.fillText(plateau[y][x].piece.name == null ? "" : plateau[y][x].piece.name, x * CELL_SIZE + 25, y * CELL_SIZE + 25);
                    ctx.strokeRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                }
            }
        }

        function rebuild() {
            for (let y = 0; y < 8; y++) {
                for (let x = 0; x < 8; x++) {
                    if ((x + y) % 2 === 0) {
                        plateau[y][x].colorIndex = "white";
                    }
                    else {
                        plateau[y][x].colorIndex = "black";
                    }
                }
            }
        }

        function onClick(e) {
            posX = Math.floor(e.clientX / 50);
            posY = Math.floor(e.clientY / 50);
            if (selectedPion !== null) {
                selectedPion.piece.move();
                for (let y = 0; y < 8; y++) {
                    for (let x = 0; x < 8; x++) {
                        if (KingIsInChess == false)
                            if (plateau[y][x].piece.name === "K" && plateau[y][x].piece.isWhite === isWhiteTurn) {
                                selectedPion = { piece: plateau[y][x].piece };
                                document.getElementById("message").innerHTML = selectedPion.piece.isInChess(isWhiteTurn, x, y);
                                break;
                            }
                            else
                                if (plateau[y][x].piece.name === "K" && plateau[y][x].piece.isWhite !== isWhiteTurn) {
                                    selectedPion = { piece: plateau[y][x].piece };
                                    document.getElementById("message").innerHTML = selectedPion.piece.isInChess(isWhiteTurn, x, y);
                                    break;
                                }
                    }
                    selectedPion = null;
                    refresh();
                }
            } else {
                if (posX < plateau.length && posY < plateau.length) {
                    if (plateau[posY][posX].piece !== "") {
                        selectedPion = { piece: plateau[posY][posX].piece };
                        showRoutes(posX, posY);
                    }
                }
                refresh();
            }
        }

        function showRoutes(x, y) {
            selectedPion.piece.showRoutes(x, y, isWhiteTurn);
        }

    </script>
</body>

</html>

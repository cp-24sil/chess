<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chess</title>
    <style>
        body {
            font-family: 'Segoe UI';
            background-color: #1e1e24;
            color: #f5f5f7;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .appBar {
            background-color: #2a2b36;
            width: 100%;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            position: absolute;
            top: 0;
        }

        .appBar h2 {
            margin: 0;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 1px;
            color: white;
        }

        #display {
            background-color: #31363f;
            border: 6px solid #2a2b36;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease;
        }


        #turn {
            font-size: 20px;
            font-weight: 600;
            margin-top: 25px;
            margin-bottom: 5px;
            color: #e0e0e0;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        #message {
            font-size: 16px;
            color: #e74c3c;
            height: 24px;
            margin-bottom: 15px;
            font-style: italic;
        }

        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4);
            transition: all 0.3s ease;
        }
    </style>
    <script type="module" src="./js/app.js"></script>
</head>

<body onload="init()">
    <div class="appBar">
        <h2>Jeu d'Échecs</h2>
    </div>
    <div>
        <h3>Blancs</h3>
        <canvas id="displayPieceWhite" width="400" height="40"></canvas>
        <h3>Noirs</h3>
        <canvas id="displayPieceblack" width="400" height="40"></canvas>
        <h3></h3>
    </div>
    <canvas id="display" width="400" height="400"></canvas>
    <p id="turn">Au tour des Blancs</p>
    <p id="message"></p>
    <br>

    <body>
        <button id="btn-nouvelle-partie">Nouvelle partie</button>
    </body>

    <script type="module" src="./js/pion.js" defer></script>
    <script type="module" src="./js/tour.js" defer></script>
    <script type="module" src="./js/roi.js" defer></script>
    <script type="module" src="./js/reine.js" defer></script>
    <script type="module" src="./js/fou.js" defer></script>
    <script type="module" src="./js/cavalier.js" defer></script>
    <script type="module" src="./js/piece.js"></script>

</body>

</html>
